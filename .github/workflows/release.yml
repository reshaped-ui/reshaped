name: Create Release

on:
  push:
    tags:
      # Changesets creates tags in format: package-name@version or @scope/package@version
      # Trigger on all package releases since packages are versioned together
      - "reshaped@*"
      - "@reshaped/core@*"

permissions:
  contents: write # Required to create releases

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog generation

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get package name and version from tag
        id: tag_info
        run: |
          # Extract tag name (e.g., "reshaped@3.9.0-canary.27" or "@reshaped/core@3.9.0-canary.27")
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

          # Extract version (everything after the last @)
          VERSION="${TAG_NAME##*@}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Create release name from tag (e.g., "reshaped@3.9.0-canary.27" or "@reshaped/core@3.9.0-canary.27")
          echo "release_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Extract changelog for current version
        id: changelog
        run: |
          # Extract the changelog content for this version
          VERSION="${{ steps.tag_info.outputs.version }}"

          # Read CHANGELOG.md and extract the section for this version
          # Changesets uses format: ## VERSION (e.g., ## 3.9.0-canary.27)
          if grep -q "^## $VERSION" CHANGELOG.md; then
            # Extract content between this version and the next version heading
            # Start printing after the version line, stop at the next version heading
            CHANGELOG_CONTENT=$(awk "
              BEGIN { found=0; }
              /^## $VERSION\$/ { found=1; next; }
              found && /^## [0-9]/ { exit; }
              found { print; }
            " CHANGELOG.md)
            
            # Trim leading and trailing empty lines
            CHANGELOG_CONTENT=$(echo "$CHANGELOG_CONTENT" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba' -e '}')
            
            # If changelog is empty, use a default message
            if [ -z "$CHANGELOG_CONTENT" ]; then
              CHANGELOG_CONTENT="Release version $VERSION"
            fi
          else
            CHANGELOG_CONTENT="Release version $VERSION"
          fi

          # Write to file to preserve formatting
          echo "$CHANGELOG_CONTENT" > changelog_excerpt.md

          # Also output for logging
          echo "Changelog content:"
          cat changelog_excerpt.md

      - name: Check if pre-release
        id: prerelease
        run: |
          # Check if version contains pre-release indicators
          VERSION="${{ steps.tag_info.outputs.version }}"
          if [[ "$VERSION" == *"canary"* ]] || [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_info.outputs.tag }}
          name: ${{ steps.tag_info.outputs.release_name }}
          body_path: changelog_excerpt.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: false # We're using our own changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
