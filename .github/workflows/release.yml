name: Create Release

on:
  push:
    tags:
      # Changesets creates tags in format: package-name@version or @scope/package@version
      # Only trigger on main package tag since packages are versioned together
      # We'll combine changelogs from all packages for a single release
      - "reshaped@*"

permissions:
  contents: write # Required to create releases

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog generation

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get package name and version from tag
        id: tag_info
        run: |
          # Extract tag name (e.g., "reshaped@3.9.0-canary.27" or "@reshaped/core@3.9.0-canary.27")
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

          # Extract version (everything after the last @)
          VERSION="${TAG_NAME##*@}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Create release name from version (e.g., "v3.9.0-canary.27")
          # Since packages are versioned together, use a single release name
          echo "release_name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Extract and combine changelogs for current version
        id: changelog
        run: |
          # Extract the changelog content for this version
          VERSION="${{ steps.tag_info.outputs.version }}"

          # Function to extract changelog section from a file
          extract_changelog() {
            local file="$1"
            local version="$2"
            
            if [ ! -f "$file" ]; then
              return
            fi
            
            if grep -q "^## $version" "$file"; then
              # Extract content between this version and the next version heading
              awk "
                BEGIN { found=0; }
                /^## $version\$/ { found=1; next; }
                found && /^## [0-9]/ { exit; }
                found { print; }
              " "$file"
            fi
          }

          # Extract changelogs from both packages
          RESHAPED_CHANGELOG=$(extract_changelog "packages/reshaped/CHANGELOG.md" "$VERSION")
          CORE_CHANGELOG=$(extract_changelog "packages/core/CHANGELOG.md" "$VERSION")

          # Combine changelogs
          COMBINED_CHANGELOG=""

          if [ -n "$RESHAPED_CHANGELOG" ]; then
            COMBINED_CHANGELOG="$RESHAPED_CHANGELOG"
          fi

          if [ -n "$CORE_CHANGELOG" ]; then
            if [ -n "$COMBINED_CHANGELOG" ]; then
              COMBINED_CHANGELOG=$(printf "%s\n\n%s" "$COMBINED_CHANGELOG" "$CORE_CHANGELOG")
            else
              COMBINED_CHANGELOG="$CORE_CHANGELOG"
            fi
          fi

          # Trim leading and trailing empty lines
          if [ -n "$COMBINED_CHANGELOG" ]; then
            COMBINED_CHANGELOG=$(echo "$COMBINED_CHANGELOG" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba' -e '}')
          fi

          # If changelog is empty, use a default message
          if [ -z "$COMBINED_CHANGELOG" ]; then
            COMBINED_CHANGELOG="Release version $VERSION"
          fi

          # Write to file to preserve formatting
          echo "$COMBINED_CHANGELOG" > changelog_excerpt.md

          # Also output for logging
          echo "Changelog content:"
          cat changelog_excerpt.md

      - name: Check if pre-release
        id: prerelease
        run: |
          # Check if version contains pre-release indicators
          VERSION="${{ steps.tag_info.outputs.version }}"
          if [[ "$VERSION" == *"canary"* ]] || [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the main package tag, but create a single release per version
          tag_name: ${{ steps.tag_info.outputs.tag }}
          name: ${{ steps.tag_info.outputs.release_name }}
          body_path: changelog_excerpt.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: false # We're using our own changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
