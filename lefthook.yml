pre-commit:
  parallel: true
  commands:
    lint:js:
      glob: "packages/**/*.{ts,tsx}"
      run: pnpm -s oxlint --fix --deny-warnings {staged_files} && git add {staged_files}
    lint:css:
      glob: "packages/**/*.css"
      run: pnpm -s stylelint --fix --max-warnings 0 {staged_files} && git add {staged_files}
    lint:format:
      glob: "packages/**/*.{js,jsx,ts,tsx,css,json,md,yml,yaml}"
      run: pnpm -s oxfmt {staged_files} && git add {staged_files}
